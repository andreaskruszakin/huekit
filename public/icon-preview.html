<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HueKit — icon preview</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 48px 24px;
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .lockup {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .lockup img {
    width: 88px;
    height: 88px;
    flex-shrink: 0;
  }
  .lockup h1 {
    margin: 0;
    font-size: clamp(2rem, 5vw, 2.75rem);
    font-weight: 650;
    letter-spacing: -0.045em;
    line-height: 1;
  }
  .lockup h1 span {
    color: rgba(255, 255, 255, 0.42);
    font-weight: 550;
  }
  .sizes {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .sizes img {
    width: 256px;
    height: 256px;
  }
  .sizes p {
    margin: 0;
    color: rgba(255, 255, 255, 0.38);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>
  <div class="lockup">
    <img src="/huekit-icon.svg" width="88" height="88" alt="">
    <h1>Hue<span>Kit</span></h1>
  </div>
  <div class="sizes">
    <img src="/huekit-icon.svg" width="256" height="256" alt="HueKit app icon at 512 logical px">
    <p>512 × 512 · neomorphic squircle · hue ring · dial knob</p>
  </div>
</body>
</html>
