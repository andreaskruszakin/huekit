<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
    <filter id="hk-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#hk-bg)" filter="url(#hk-shadow)"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="32" cy="32" r="17" fill="#0e0e10" stroke="rgba(0,0,0,0.5)" stroke-width="1"/>
  <circle cx="32" cy="18" r="4.2" fill="#fff" filter="url(#hk-shadow)"/>
